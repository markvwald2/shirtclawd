<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image URL Grid Viewer</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .wrap {
      max-width: 1300px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.5rem;
    }

    .status {
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    .filter {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 0.9rem;
      min-width: 180px;
    }

    .filter input {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font: inherit;
      color: var(--text);
      background: #fff;
    }

    .filter select {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font: inherit;
      color: var(--text);
      background: #fff;
    }

    .toolbar button {
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      cursor: pointer;
      font: inherit;
      font-weight: 600;
    }

    .toggle-row {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.9rem;
      color: var(--text);
      margin-right: 8px;
    }

    .bulk {
      margin-bottom: 16px;
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      flex-wrap: wrap;
      align-items: end;
      gap: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }

    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
    }

    .card.selected {
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
    }

    .select-wrap {
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 1;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2px 5px;
      font-size: 0.75rem;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .thumb {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      background: #eef2f7;
    }

    .name {
      padding: 10px 12px 6px;
      font-size: 0.9rem;
      line-height: 1.3;
      font-weight: 600;
    }

    .editor {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      padding: 0 12px 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .field input {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font: inherit;
      color: var(--text);
      background: #fff;
    }

    .error { color: #b91c1c; font-weight: 600; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>output_image_urls.json Viewer</h1>
    <div id="status" class="status">Loading...</div>
    <div class="toolbar">
      <label class="filter">
        <span>Theme picker</span>
        <select id="theme-picker">
          <option value="">All themes</option>
        </select>
      </label>
      <label class="filter">
        <span>Sub-theme picker</span>
        <select id="sub-theme-picker">
          <option value="">All sub-themes</option>
        </select>
      </label>
      <label class="filter">
        <span>Filter theme</span>
        <input id="theme-filter" type="text" placeholder="e.g. geography" />
      </label>
      <label class="filter">
        <span>Filter tag</span>
        <input id="tag-filter" type="text" placeholder="e.g. movies" />
      </label>
      <label class="toggle-row">
        <input id="unthemed-only" type="checkbox" />
        <span>Un-themed only</span>
      </label>
      <button id="clear-filters" type="button">Clear Filters</button>
      <button id="export-json" type="button">Export JSON</button>
    </div>
    <div class="bulk">
      <label class="filter">
        <span>Bulk theme</span>
        <input id="bulk-theme" type="text" placeholder="e.g. geography" />
      </label>
      <label class="filter">
        <span>Bulk sub-theme</span>
        <input id="bulk-sub-theme" type="text" placeholder="e.g. State names" />
      </label>
      <label class="filter">
        <span>Bulk tags (comma-separated)</span>
        <input id="bulk-tags" type="text" placeholder="e.g. geography, state-names" />
      </label>
      <button id="apply-selected" type="button">Apply To Selected</button>
      <button id="select-visible" type="button">Select Visible</button>
      <button id="clear-selection" type="button">Clear Selection</button>
    </div>
    <section id="grid" class="grid"></section>
  </main>

  <script>
    const statusEl = document.getElementById('status');
    const gridEl = document.getElementById('grid');
    const themePickerEl = document.getElementById('theme-picker');
    const subThemePickerEl = document.getElementById('sub-theme-picker');
    const themeFilterEl = document.getElementById('theme-filter');
    const tagFilterEl = document.getElementById('tag-filter');
    const unthemedOnlyEl = document.getElementById('unthemed-only');
    const clearFiltersEl = document.getElementById('clear-filters');
    const exportJsonEl = document.getElementById('export-json');
    const bulkThemeEl = document.getElementById('bulk-theme');
    const bulkSubThemeEl = document.getElementById('bulk-sub-theme');
    const bulkTagsEl = document.getElementById('bulk-tags');
    const applySelectedEl = document.getElementById('apply-selected');
    const selectVisibleEl = document.getElementById('select-visible');
    const clearSelectionEl = document.getElementById('clear-selection');
    const entries = [];
    const dataset = [];

    function makeCard(item) {
      const card = document.createElement('article');
      card.className = 'card';

      const selectWrap = document.createElement('label');
      selectWrap.className = 'select-wrap';
      const selectInput = document.createElement('input');
      selectInput.type = 'checkbox';
      selectWrap.appendChild(selectInput);
      selectWrap.appendChild(document.createTextNode('Select'));

      const img = document.createElement('img');
      img.className = 'thumb';
      img.loading = 'lazy';
      img.src = item.URL;
      img.alt = item.name || 'image';

      const name = document.createElement('div');
      name.className = 'name';
      name.textContent = item.name || '(unnamed)';

      const editor = document.createElement('div');
      editor.className = 'editor';

      const themeField = document.createElement('label');
      themeField.className = 'field';
      themeField.innerHTML = '<span>Theme</span>';
      const themeInput = document.createElement('input');
      themeInput.type = 'text';
      themeInput.value = item.theme || '';
      themeField.appendChild(themeInput);

      const subThemeField = document.createElement('label');
      subThemeField.className = 'field';
      subThemeField.innerHTML = '<span>Sub-theme</span>';
      const subThemeInput = document.createElement('input');
      subThemeInput.type = 'text';
      subThemeInput.value = item.sub_theme || '';
      subThemeField.appendChild(subThemeInput);

      const tagsField = document.createElement('label');
      tagsField.className = 'field';
      tagsField.innerHTML = '<span>Tags (comma-separated)</span>';
      const tagsInput = document.createElement('input');
      tagsInput.type = 'text';
      tagsInput.value = Array.isArray(item.tags) ? item.tags.join(', ') : '';
      tagsField.appendChild(tagsInput);

      editor.appendChild(themeField);
      editor.appendChild(subThemeField);
      editor.appendChild(tagsField);

      card.appendChild(selectWrap);
      card.appendChild(img);
      card.appendChild(name);
      card.appendChild(editor);
      return { card, themeInput, subThemeInput, tagsInput, selectInput };
    }

    function updateCardSelectionVisual(entry) {
      entry.card.classList.toggle('selected', entry.selectInput.checked);
    }

    function applyFilters() {
      const selectedTheme = themePickerEl.value.trim().toLowerCase();
      const selectedSubTheme = subThemePickerEl.value.trim().toLowerCase();
      const themeNeedle = themeFilterEl.value.trim().toLowerCase();
      const tagNeedle = tagFilterEl.value.trim().toLowerCase();
      const unthemedOnly = unthemedOnlyEl.checked;
      let visibleCount = 0;
      let selectedCount = 0;

      entries.forEach((entry) => {
        const themeVal = String(entry.item.theme || '').toLowerCase();
        const subThemeVal = String(entry.item.sub_theme || '').toLowerCase();
        const tagsVal = Array.isArray(entry.item.tags) ? entry.item.tags.map((t) => String(t).toLowerCase()) : [];
        const matchPicker = !selectedTheme || themeVal === selectedTheme;
        const matchSubThemePicker = !selectedSubTheme || subThemeVal === selectedSubTheme;
        const matchTheme = !themeNeedle || themeVal.includes(themeNeedle);
        const matchTag = !tagNeedle || tagsVal.some((t) => t.includes(tagNeedle));
        const matchUnthemed = !unthemedOnly || !entry.item.theme || !entry.item.theme.trim();
        const show = matchPicker && matchSubThemePicker && matchTheme && matchTag && matchUnthemed;
        entry.card.style.display = show ? '' : 'none';
        if (show) visibleCount += 1;
        if (entry.selectInput.checked) selectedCount += 1;
      });

      statusEl.textContent = `Loaded ${dataset.length} images. Showing ${visibleCount}. Selected ${selectedCount}.`;
    }

    function parseTags(value) {
      return value
        .split(',')
        .map((t) => t.trim())
        .filter(Boolean);
    }

    function exportJson() {
      const out = JSON.stringify(dataset, null, 2) + '\n';
      const blob = new Blob([out], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'output_image_urls.json';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function applyBulkToSelected() {
      const themeVal = bulkThemeEl.value.trim();
      const subThemeVal = bulkSubThemeEl.value.trim();
      const bulkTags = parseTags(bulkTagsEl.value);
      entries.forEach((entry) => {
        if (!entry.selectInput.checked) return;
        if (themeVal) {
          entry.item.theme = themeVal;
          entry.themeInput.value = themeVal;
        }
        if (subThemeVal) {
          entry.item.sub_theme = subThemeVal;
          entry.subThemeInput.value = subThemeVal;
        }
        if (bulkTags.length) {
          const merged = new Set([...(Array.isArray(entry.item.tags) ? entry.item.tags : []), ...bulkTags]);
          entry.item.tags = Array.from(merged);
          entry.tagsInput.value = entry.item.tags.join(', ');
        }
      });
      applyFilters();
    }

    function renderThemePicker() {
      const seen = new Set();
      const themes = [];
      dataset.forEach((item) => {
        const t = String(item.theme || '').trim();
        if (!t) return;
        const key = t.toLowerCase();
        if (seen.has(key)) return;
        seen.add(key);
        themes.push(t);
      });
      themes.sort((a, b) => a.localeCompare(b));

      themePickerEl.innerHTML = '';
      const allOpt = document.createElement('option');
      allOpt.value = '';
      allOpt.textContent = 'All themes';
      themePickerEl.appendChild(allOpt);

      themes.forEach((theme) => {
        const opt = document.createElement('option');
        opt.value = theme;
        opt.textContent = theme;
        themePickerEl.appendChild(opt);
      });
    }

    function renderSubThemePicker() {
      const seen = new Set();
      const subThemes = [];
      dataset.forEach((item) => {
        const s = String(item.sub_theme || '').trim();
        if (!s) return;
        const key = s.toLowerCase();
        if (seen.has(key)) return;
        seen.add(key);
        subThemes.push(s);
      });
      subThemes.sort((a, b) => a.localeCompare(b));

      subThemePickerEl.innerHTML = '';
      const allOpt = document.createElement('option');
      allOpt.value = '';
      allOpt.textContent = 'All sub-themes';
      subThemePickerEl.appendChild(allOpt);

      subThemes.forEach((subTheme) => {
        const opt = document.createElement('option');
        opt.value = subTheme;
        opt.textContent = subTheme;
        subThemePickerEl.appendChild(opt);
      });
    }

    async function init() {
      try {
        const res = await fetch('./output_image_urls.json', { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();
        if (!Array.isArray(data)) throw new Error('Expected JSON array');

        const sorted = [...data].sort((a, b) => String(a.name || '').localeCompare(String(b.name || '')));
        sorted.forEach((item) => {
          if (!item || !item.URL) return;
          if (typeof item.theme !== 'string') item.theme = '';
          if (typeof item.sub_theme !== 'string') item.sub_theme = '';
          if (!Array.isArray(item.tags)) item.tags = [];

          dataset.push(item);
          const { card, themeInput, subThemeInput, tagsInput, selectInput } = makeCard(item);
          gridEl.appendChild(card);

          themeInput.addEventListener('input', () => {
            item.theme = themeInput.value.trim();
            applyFilters();
          });
          subThemeInput.addEventListener('input', () => {
            item.sub_theme = subThemeInput.value.trim();
          });
          tagsInput.addEventListener('change', () => {
            item.tags = parseTags(tagsInput.value);
            tagsInput.value = item.tags.join(', ');
            applyFilters();
          });
          selectInput.addEventListener('change', () => {
            updateCardSelectionVisual({ card, selectInput });
            applyFilters();
          });

          const entry = { card, item, themeInput, subThemeInput, tagsInput, selectInput };
          entries.push(entry);
          updateCardSelectionVisual(entry);
        });

        renderThemePicker();
        renderSubThemePicker();
        themePickerEl.addEventListener('change', applyFilters);
        subThemePickerEl.addEventListener('change', applyFilters);
        themeFilterEl.addEventListener('input', applyFilters);
        tagFilterEl.addEventListener('input', applyFilters);
        unthemedOnlyEl.addEventListener('change', applyFilters);
        clearFiltersEl.addEventListener('click', () => {
          themePickerEl.value = '';
          subThemePickerEl.value = '';
          themeFilterEl.value = '';
          tagFilterEl.value = '';
          unthemedOnlyEl.checked = false;
          applyFilters();
        });
        exportJsonEl.addEventListener('click', exportJson);
        applySelectedEl.addEventListener('click', applyBulkToSelected);
        selectVisibleEl.addEventListener('click', () => {
          entries.forEach((entry) => {
            if (entry.card.style.display !== 'none') {
              entry.selectInput.checked = true;
              updateCardSelectionVisual(entry);
            }
          });
          applyFilters();
        });
        clearSelectionEl.addEventListener('click', () => {
          entries.forEach((entry) => {
            entry.selectInput.checked = false;
            updateCardSelectionVisual(entry);
          });
          applyFilters();
        });

        applyFilters();
      } catch (err) {
        statusEl.innerHTML = `<span class="error">Failed to load JSON: ${err.message}</span>`;        
      }
    }

    init();
  </script>
</body>
</html>
