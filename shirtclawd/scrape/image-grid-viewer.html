<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image URL Grid Viewer</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .wrap {
      max-width: 1300px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.5rem;
    }

    .status {
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .themes {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    .theme-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.9rem;
      color: var(--text);
      user-select: none;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
    }

    .thumb {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      background: #eef2f7;
    }

    .name {
      padding: 10px 12px 12px;
      font-size: 0.9rem;
      line-height: 1.3;
    }

    .error { color: #b91c1c; font-weight: 600; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>output_image_urls.json Viewer</h1>
    <div id="status" class="status">Loading...</div>
    <div id="theme-controls" class="themes"></div>
    <section id="grid" class="grid"></section>
  </main>

  <script>
    const statusEl = document.getElementById('status');
    const themeControlsEl = document.getElementById('theme-controls');
    const gridEl = document.getElementById('grid');
    const THEME_DEFS = [
      {
        id: 'us-states',
        label: 'US States',
        names: [
          'Alabama', 'Alaska', 'Arizona', 'arkansas', 'California', 'Colorado', 'Connecticut', 'Delaware',
          'Florida', 'Georgia', 'Hawaii', 'idaho', 'Illinois', 'Indiana', 'Iowa', 'Kansas', 'Kentucky',
          'Louisiana', 'Maine', 'Maryland', 'Massachusetts', 'Minnesota', 'Mississippi', 'Missouri',
          'Nebraska', 'Nevada', 'New Hampshire', 'New Jersey', 'New Mexico', 'New York', 'North Carolina',
          'North Dakota', 'Ohio', 'Oklahoma', 'Oregon', 'Pennsylvania', 'Rhode Island', 'South Carolina',
          'South Dakota', 'Tennessee', 'Texas', 'Utah', 'Vermont', 'Virginia', 'Washington', 'West Virginia',
          'Wisconsin', 'Wyoming'
        ]
      },
      {
        id: 'us-state-capitals',
        label: 'US State Capitals',
        names: [
          'Albany', 'Annapolis', 'Atlanta', 'Augusta', 'Austin', 'Baton Rouge', 'Bismarck', 'Boise', 'Boston',
          'Carson City', 'Charleston', 'Cheyenne', 'Columbia', 'Columbus', 'Concord', 'denver', 'Des Moines',
          'Dover', 'Frankfort', 'Harrisburg', 'Hartford', 'Helena', 'Honolulu', 'Indianapolis', 'Jackson',
          'Jefferson City', 'Juneau', 'Lansing', 'Little Rock', 'Madison', 'Montgomery', 'Montpelier',
          'Nashville', 'Oklahoma City', 'olympia', 'Phoenix', 'Pierre', 'Providence', 'Raleigh', 'Richmond',
          'Sacramento', 'Salem', 'Salt Lake City', 'Santa Fe', 'Springfield', 'St Paul', 'Tallahassee',
          'Topeka', 'Trenton'
        ]
      },
      {
        id: 'cta',
        label: 'Chicago Transit (CTA)',
        names: [
          'Addison Blue Line', 'Addison Brown Line', 'Addison CTA', 'Armitage Brown Line', 'Belmont',
          'Belmont Blue Line', 'Belmont Brown Line', 'California Blue Line', 'Chicago brown', 'Chicago CTA',
          'Clark/Division CTA Stop', 'Clark/Lake Blue Line', 'Cumberland Blue Line', 'Damen Blue Line',
          'Damen CTA Brown Line', 'Diversey CTA Brown Line', 'Fullerton CTA', 'Fullerton CTA Brown Line',
          'Harlem Blue Line', 'Irving Park Blue Line', 'Irving Park CTA Brown Line', 'Logan Square Blue Line',
          'Montrose Blue Line', 'Montrose CTA Brown Line', 'North Clybourn', 'Sedgwick CTA Brown Line',
          'Southport CTA Brown Line', 'Sox-35th Red Line', 'Wellington CTA Brown Line', 'Western Blue Line',
          'Western CTA Brown Line'
        ]
      }
    ];
    const THEME_SETS = new Map();
    const entries = [];
    let loadedCount = 0;

    function makeCard(item) {
      const card = document.createElement('article');
      card.className = 'card';

      const img = document.createElement('img');
      img.className = 'thumb';
      img.loading = 'lazy';
      img.src = item.URL;
      img.alt = item.name || 'image';

      const name = document.createElement('div');
      name.className = 'name';
      name.textContent = item.name || '(unnamed)';

      card.appendChild(img);
      card.appendChild(name);
      return card;
    }

    function normalize(value) {
      return String(value || '')
        .toLowerCase()
        .replace(/&amp;/g, ' and ')
        .replace(/&/g, ' and ')
        .replace(/[’']/g, '')
        .replace(/\+/g, ' plus ')
        .replace(/[^a-z0-9]+/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function buildThemeSets() {
      THEME_DEFS.forEach((theme) => {
        THEME_SETS.set(theme.id, new Set(theme.names.map(normalize)));
      });
    }

    function renderThemeControls() {
      themeControlsEl.innerHTML = '';
      THEME_DEFS.forEach((theme) => {
        const label = document.createElement('label');
        label.className = 'theme-toggle';

        const input = document.createElement('input');
        input.type = 'checkbox';
        input.checked = true;
        input.dataset.themeId = theme.id;
        input.addEventListener('change', applyFilters);

        const text = document.createElement('span');
        text.textContent = theme.label;

        label.appendChild(input);
        label.appendChild(text);
        themeControlsEl.appendChild(label);
      });
    }

    function applyFilters() {
      const enabled = new Set(
        Array.from(themeControlsEl.querySelectorAll('input[data-theme-id]:checked')).map((el) => el.dataset.themeId)
      );
      let visibleCount = 0;

      entries.forEach((entry) => {
        const show = entry.themes.length === 0 || entry.themes.some((t) => enabled.has(t));
        entry.card.style.display = show ? '' : 'none';
        if (show) visibleCount += 1;
      });

      statusEl.textContent = `Loaded ${loadedCount} images. Showing ${visibleCount}.`;
    }

    async function init() {
      try {
        buildThemeSets();
        const res = await fetch('./output_image_urls.json', { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();
        if (!Array.isArray(data)) throw new Error('Expected JSON array');

        renderThemeControls();

        data.forEach((item) => {
          if (!item || !item.URL) return;

          const card = makeCard(item);
          gridEl.appendChild(card);
          loadedCount += 1;

          const itemName = normalize(item.name);
          const themes = [];
          THEME_DEFS.forEach((theme) => {
            const set = THEME_SETS.get(theme.id);
            if (set && set.has(itemName)) themes.push(theme.id);
          });
          entries.push({ card, themes });
        });

        applyFilters();
      } catch (err) {
        statusEl.innerHTML = `<span class="error">Failed to load JSON: ${err.message}</span>`;
        themeControlsEl.innerHTML = '';
      }
    }

    init();
  </script>
</body>
</html>
